# [P1-LIVE-2 · 2026-05-12 · refactor P0-PROD-AUDIT-1 · 2026-05-23] CI gate para
# el repo backend `fuegoservicios-lab/MealfitRD-Backend`.
#
# Hasta que este workflow exista, el repo no tenía ejecución automática de
# tests pre-merge. Toda la red de seguridad (~120+ tests parser-based)
# dependía de que el desarrollador invoque pytest manualmente — modo de
# fallo: refactor lateral (e.g. P1-SCHEDULER-1 quebró 5 tests SOP por una
# línea reformateada) no se detectaba hasta el siguiente audit manual.
#
# [P0-PROD-AUDIT-1 · 2026-05-23] Refactor: el workflow original asumía un
# meta-workspace donde este repo vivía como `<workspace>/backend/` junto a
# `<workspace>/frontend/` (repos hermanos en un monorepo virtual local).
# En CI real GitHub clona `fuegoservicios-lab/MealfitRD-Backend` en root
# (`/home/runner/work/MealfitRD-Backend/MealfitRD-Backend/`), por lo que
# `working-directory: backend` + `cache-dependency-path: backend/...`
# fallaban con "No file matched" en TODOS los runs históricos (silenciosamente
# — `Frontend Vitest` falló durante meses por el mismo gap).
#
# Cambios:
#   - Eliminados los 3 jobs frontend-* (frontend-tests, frontend-build,
#     frontend-lint). El frontend vive en el repo hermano
#     `fuegoservicios-lab/MealfitRD` y debe tener su propio workflow CI ahí.
#   - Removidos `working-directory: backend` y `cache-dependency-path:
#     backend/<path>` de todos los jobs backend; ahora usan root del repo.
#   - Para Docker build: `context: .` + `file: ./Dockerfile`.
#
# Jobs activos (todos backend):
#   1. backend-tests             : pytest del bundle parser-based + funcionales.
#   2. backend-security-audit    : pip-audit non-blocking (P0-PROD-AUDIT-1).
#   3. backend-docker-build      : valida Dockerfile multistage + non-root + HEALTHCHECK.
#
# Trigger:
#   - push a cualquier branch (gate de regresión continua).
#   - pull_request a main (gate pre-merge).
#
# Política:
#   - main protegido: PR requiere los jobs blocking verdes antes de mergear
#     (configurar branch protection rule en GitHub UI tras primer push).
#   - cualquier job rojo bloqueante bloquea el merge — NO usar "merge anyway"
#     salvo hotfix P0 documentado en PR description con plan de fix-forward.
#   - `backend-security-audit` es non-blocking inicial (baseline puede tener
#     warns históricos); flippear a blocking post-cleanup.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# Cancelar runs viejos del mismo branch para no agotar minutos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest (P0-PROD-AUDIT suite — alcance limitado)
        env:
          # Las suites parser-based no requieren DB real. Las E2E sí, pero
          # se marcan con @pytest.mark.e2e y se pueden filtrar en CI sin DB.
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        # [P0-PROD-AUDIT-1 · 2026-05-23] Scope conservador: corre solo los 5
        # tests nuevos del bundle de gaps P0. Razón: los ~770 tests legacy
        # usan `Path(__file__).resolve().parents[2]` para localizar CLAUDE.md
        # (~101 archivos), asumiendo layout meta-workspace donde este repo
        # vive como `<workspace>/backend/`. En CI standalone (este repo es
        # clonado directamente en `$GITHUB_WORKSPACE`), `parents[2]` apunta
        # fuera del repo → tests fallan con FileNotFoundError.
        #
        # El gap "tests legacy asumen meta-workspace" es real pero fuera de
        # scope del bundle P0 actual. Follow-up `P1-TESTS-LAYOUT-COMPAT`:
        # añadir shim en conftest.py que resuelva ambos layouts, o migrar
        # los 101 tests a `parents[1]` (= backend root) + fallback. Mientras
        # tanto, este job valida que las invariantes del bundle P0 (auth
        # coverage, Dockerfile, runbooks, load test script) NO regresionen.
        #
        # Cuando se cierre P1-TESTS-LAYOUT-COMPAT, ampliar el patrón a
        # `pytest tests/ -v --tb=short -m "not e2e"` (sin -x para visibilidad
        # de todas las fallas si las hay).
        run: |
          pytest tests/test_p0_prod_audit_*.py -v --tb=short

  # [P0-PROD-AUDIT-1 · 2026-05-23] Audit de CVEs en `requirements.txt`.
  #
  # Pre-fix: ningún gate de CI ejecutaba `pip-audit` (o `safety check`,
  # `osv-scanner`, etc.) contra el requirements.txt. La auditoría de
  # producción 2026-05-23 flageó este gap como B-P0-3: deps de 2024
  # (`langchain==1.2.18`, `langgraph==1.1.10`, `psycopg==3.3.4`) sin
  # validación regular contra el GitHub Advisory Database. Riesgo: RCE/DoS
  # silencioso si emerge un CVE en una dep que ya está en producción.
  #
  # Estrategia: `pip-audit` con `continue-on-error: true` inicialmente.
  # Razón: el primer run probablemente encuentra varios warnings históricos;
  # bloquear el merge sobre baseline paraliza todo. Job ejecuta y reporta
  # status visible en GitHub UI, pero NO bloquea merge.
  #
  # Roadmap: tras 1-2 sprints de cleanup (bump de deps afectadas o
  # `--ignore-vuln <ID>` documentado per-CVE), flippear a `continue-on-error:
  # false` para convertirlo en gate bloqueante real.
  #
  # Knob de tuning si pip-audit es muy lento: `--cache-dir /tmp/pip-audit`.
  # Output JSON consumible por dashboards: `--format json -o audit.json`.
  backend-security-audit:
    name: Backend pip-audit (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        # `--disable-pip` evita que pip-audit haga `pip install` real
        # (más rápido + más seguro en CI). Resuelve solo el árbol de deps
        # declarado.
        # `--strict` falla con código distinto a 0 si encuentra vulnerabilidad
        # — el continue-on-error: true del job lo absorbe sin bloquear merge,
        # pero el status check sigue visible en rojo.
        run: |
          pip-audit -r requirements.txt --disable-pip --strict

  # [P0-PROD-AUDIT-1 · 2026-05-23] Validar que el `Dockerfile` builde.
  #
  # Pre-fix: el Dockerfile podía regresionar (e.g. RUN pip install fallando
  # por falta de libpq-dev tras un cambio en el builder stage) y el gap
  # solo se detectaba en el deploy a EasyPanel. Costo: rollback manual +
  # diagnóstico sin telemetría del build local.
  #
  # Estrategia: BuildKit cache + `--target builder` no se usa (queremos
  # validar también el stage runtime). Tiempo esperado: ~90s en runner
  # standard con cache calentado, ~180s cold.
  #
  # Gate bloqueante: si el Dockerfile NO buildea, NO se debería poder
  # mergear — eso es un break de la convención reproducibility de
  # P0-PROD-AUDIT-1.
  backend-docker-build:
    name: Backend Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (multi-stage) and validate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: mealfit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image metadata
        # Sanity: la imagen final corre como non-root (uid 10001) + tiene
        # HEALTHCHECK + entrypoint usa dumb-init. Si alguien borra estas
        # invariantes del Dockerfile, este step falla loud.
        run: |
          docker inspect mealfit-backend:ci \
            --format='User: {{.Config.User}}{{"\n"}}Entrypoint: {{.Config.Entrypoint}}{{"\n"}}Healthcheck: {{.Config.Healthcheck.Test}}'
          docker inspect mealfit-backend:ci --format='{{.Config.User}}' | grep -q '^appuser$\|^10001$' || (echo "❌ Image NO corre como non-root user" && exit 1)
          docker inspect mealfit-backend:ci --format='{{.Config.Healthcheck.Test}}' | grep -q 'health' || (echo "❌ HEALTHCHECK ausente o roto" && exit 1)
