# [P1-LIVE-2 · 2026-05-12] CI gate para MealfitRD.IA.
#
# Hasta que este workflow exista, el repo no tenía ejecución automática de
# tests pre-merge. Toda la red de seguridad (~120+ tests parser-based +
# Vitest frontend) dependía de que el desarrollador invoque pytest/vitest
# manualmente — modo de fallo: refactor lateral (e.g. P1-SCHEDULER-1 quebró
# 5 tests SOP por una línea reformateada) no se detectaba hasta el siguiente
# audit manual.
#
# Este workflow corre 3 jobs en paralelo cuando el repo se conecte a GitHub:
#   1. backend-tests : pytest del bundle parser-based + funcionales.
#   2. frontend-tests: vitest unit + integration.
#   3. frontend-build: vite build production (catch errores de bundle).
#
# Trigger:
#   - push a cualquier branch (gate de regresión continua).
#   - pull_request a main (gate pre-merge).
#
# Política:
#   - main protegido: PR requiere los 3 jobs verde antes de mergear
#     (configurar branch protection rule en GitHub UI tras primer push).
#   - cualquier job rojo bloquea el merge — NO usar "merge anyway" salvo
#     hotfix P0 documentado en PR description con plan de fix-forward.

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

# Cancelar runs viejos del mismo branch para no agotar minutos.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest (parser-based + functional)
        working-directory: backend
        env:
          # Las suites parser-based no requieren DB real. Las E2E sí, pero
          # se marcan con @pytest.mark.e2e y se pueden filtrar en CI sin DB.
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
        run: |
          pytest tests/ -v --tb=short -m "not e2e" -x

  frontend-tests:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Vite production build
        working-directory: frontend
        # Vite build valida tree-shaking + import resolution + bundle size.
        # Falla si hay imports rotos, dependencias missing, o errores de
        # transformación que pasan vitest pero rompen prod.
        run: npm run build

  # [P0-PROD-AUDIT-1 · 2026-05-23] Audit de CVEs en `requirements.txt`.
  #
  # Pre-fix: ningún gate de CI ejecutaba `pip-audit` (o `safety check`,
  # `osv-scanner`, etc.) contra el requirements.txt. La auditoría de
  # producción 2026-05-23 flageó este gap como B-P0-3: deps de 2024
  # (`langchain==1.2.18`, `langgraph==1.1.10`, `psycopg==3.3.4`) sin
  # validación regular contra el GitHub Advisory Database. Riesgo: RCE/DoS
  # silencioso si emerge un CVE en una dep que ya está en producción.
  #
  # Estrategia: `pip-audit` con `continue-on-error: true` inicialmente
  # (mismo pattern que `frontend-lint`). Razón: el primer run probablemente
  # encuentra varios warnings históricos; bloquear el merge sobre baseline
  # paraliza todo. Job ejecuta y reporta status visible en GitHub UI,
  # pero NO bloquea merge.
  #
  # Roadmap: tras 1-2 sprints de cleanup (bump de deps afectadas o
  # `--ignore-vuln <ID>` documentado per-CVE), flippear a `continue-on-error:
  # false` para convertirlo en gate bloqueante real.
  #
  # Knob de tuning si pip-audit es muy lento: `--cache-dir /tmp/pip-audit`.
  # Output JSON consumible por dashboards: `--format json -o audit.json`.
  backend-security-audit:
    name: Backend pip-audit (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        working-directory: backend
        # `--disable-pip` evita que pip-audit haga `pip install` real
        # (más rápido + más seguro en CI). Resuelve solo el árbol de deps
        # declarado.
        # `--strict` falla con código distinto a 0 si encuentra vulnerabilidad
        # — el continue-on-error: true del job lo absorbe sin bloquear merge,
        # pero el status check sigue visible en rojo.
        run: |
          pip-audit -r requirements.txt --disable-pip --strict

  # [P0-PROD-AUDIT-1 · 2026-05-23] Validar que el `Dockerfile` builde.
  #
  # Pre-fix: el Dockerfile podía regresionar (e.g. RUN pip install fallando
  # por falta de libpq-dev tras un cambio en el builder stage) y el gap
  # solo se detectaba en el deploy a EasyPanel. Costo: rollback manual +
  # diagnóstico sin telemetría del build local.
  #
  # Estrategia: BuildKit cache + `--target builder` no se usa (queremos
  # validar también el stage runtime). Tiempo esperado: ~90s en runner
  # standard con cache calentado, ~180s cold.
  #
  # Gate bloqueante: si el Dockerfile NO buildea, NO se debería poder
  # mergear — eso es un break de la convención reproducibility de
  # P0-PROD-AUDIT-1.
  backend-docker-build:
    name: Backend Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (multi-stage) and validate
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: mealfit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image metadata
        # Sanity: la imagen final corre como non-root (uid 10001) + tiene
        # HEALTHCHECK + entrypoint usa dumb-init. Si alguien borra estas
        # invariantes del Dockerfile, este step falla loud.
        run: |
          docker inspect mealfit-backend:ci \
            --format='User: {{.Config.User}}{{"\n"}}Entrypoint: {{.Config.Entrypoint}}{{"\n"}}Healthcheck: {{.Config.Healthcheck.Test}}'
          docker inspect mealfit-backend:ci --format='{{.Config.User}}' | grep -q '^appuser$\|^10001$' || (echo "❌ Image NO corre como non-root user" && exit 1)
          docker inspect mealfit-backend:ci --format='{{.Config.Healthcheck.Test}}' | grep -q 'health' || (echo "❌ HEALTHCHECK ausente o roto" && exit 1)

  # [P2-LIVE-1 · 2026-05-12] Lint job no-bloqueante.
  #
  # Estado al introducir el gate: 245 errores eslint + 13 warnings pre-existentes
  # (deuda técnica acumulada — no-useless-escape regex, no-unused-vars, no-undef
  # `process` en utils/analytics.js). Bloquear merges sobre esa baseline
  # paralizaría todo. Por eso `continue-on-error: true`: el job EJECUTA y reporta
  # status visible en GitHub UI, pero NO bloquea el merge.
  #
  # Roadmap: tras cleanup incremental que reduzca el count a 0, flippear a
  # `continue-on-error: false` para convertirlo en gate bloqueante real. Hasta
  # entonces este job sirve como telemetría: si un PR introduce errores nuevos,
  # se ven en el status check aunque no bloquee.
  frontend-lint:
    name: Frontend lint (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run eslint
        working-directory: frontend
        run: npm run lint
