# [P1-LIVE-2 · 2026-05-12] CI gate para MealfitRD.IA.
#
# [CI-FLAT-LAYOUT · 2026-05-18] El workflow asumía un layout monorepo
# (`workspace/{backend,frontend,CLAUDE.md,supabase,...}`) pero faltaba la
# orquestación: el checkout de este repo trae backend code + workspace
# config mezclados en la raíz, y faltaba el segundo checkout del frontend
# (`fuegoservicios-lab/MealfitRD`, repo separado).
#
# ~93 tests parser-based usan `Path(__file__).resolve().parents[2]` para
# resolver paths como `${WORKSPACE}/backend/routers/plans.py` o
# `${WORKSPACE}/frontend/vercel.json` — sin el layout monorepo, fallaban
# con FileNotFoundError.
#
# Fix: post-checkout, reorganizamos al layout que los tests esperan:
#   ${WORKSPACE}/CLAUDE.md          ← promovido desde backend repo root
#   ${WORKSPACE}/supabase/          ← promovido
#   ${WORKSPACE}/scripts/           ← promovido (si existe)
#   ${WORKSPACE}/backend/           ← este repo (sin los configs workspace)
#   ${WORKSPACE}/backend/routers/
#   ${WORKSPACE}/backend/tests/
#   ${WORKSPACE}/backend/*.py
#   ${WORKSPACE}/frontend/          ← fuegoservicios-lab/MealfitRD
#   ${WORKSPACE}/frontend/src/
#   ${WORKSPACE}/frontend/vercel.json
#
# Hasta que este workflow exista, el repo no tenía ejecución automática de
# tests pre-merge. Toda la red de seguridad (~120+ tests parser-based +
# Vitest frontend) dependía de que el desarrollador invoque pytest/vitest
# manualmente — modo de fallo: refactor lateral (e.g. P1-SCHEDULER-1 quebró
# 5 tests SOP por una línea reformateada) no se detectaba hasta el siguiente
# audit manual.
#
# Trigger:
#   - push a cualquier branch (gate de regresión continua).
#   - pull_request a main (gate pre-merge).

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout backend (en subdir `backend/`)
        uses: actions/checkout@v4
        with:
          path: backend

      - name: Checkout frontend (sibling `frontend/` para tests parser-based)
        uses: actions/checkout@v4
        with:
          repository: fuegoservicios-lab/MealfitRD
          path: frontend

      - name: Promover configs workspace al root (CLAUDE.md/supabase/scripts)
        # [CI-FLAT-LAYOUT · 2026-05-18] Los tests usan `parents[2]/CLAUDE.md`
        # asumiendo que vive en el workspace root, pero el repo lo trackea
        # en su raíz. Movemos solo configs workspace; el código backend
        # queda en `backend/`.
        run: |
          cd backend
          for f in CLAUDE.md supabase scripts; do
            if [ -e "$f" ]; then mv "$f" ..; fi
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest (parser-based + functional)
        working-directory: backend
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONUNBUFFERED: "1"
          # [CI-FLAT-LAYOUT · 2026-05-18] Stubs para que módulos que instancian
          # clients a import-time (db_core.create_client(SUPABASE_URL,
          # SUPABASE_KEY), agent.py:128 ChatGoogleGenerativeAI) no aborten
          # antes de collection. Tests parser-based no usan los clients; los
          # funcionales que sí los tocan deben mockear o estar marcados @e2e.
          SUPABASE_URL: https://stub-for-ci.supabase.co
          SUPABASE_KEY: stub_anon_key_for_ci_parser_tests_only
          SUPABASE_DB_URL: postgresql://stub:stub@localhost:5432/stub
          GOOGLE_API_KEY: stub_for_ci
          GEMINI_API_KEY: stub_for_ci
        run: |
          pytest tests/ -v --tb=short -m "not e2e" --continue-on-collection-errors

  frontend-tests:
    name: Frontend Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: fuegoservicios-lab/MealfitRD
          path: frontend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npm test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: fuegoservicios-lab/MealfitRD
          path: frontend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Vite production build
        working-directory: frontend
        run: npm run build

  # [P2-LIVE-1 · 2026-05-12] Lint job no-bloqueante.
  #
  # Estado al introducir el gate: 245 errores eslint + 13 warnings pre-existentes
  # (deuda técnica acumulada — no-useless-escape regex, no-unused-vars, no-undef
  # `process` en utils/analytics.js). Bloquear merges sobre esa baseline
  # paralizaría todo. Por eso `continue-on-error: true`: el job EJECUTA y reporta
  # status visible en GitHub UI, pero NO bloquea el merge.
  frontend-lint:
    name: Frontend lint (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: fuegoservicios-lab/MealfitRD
          path: frontend

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Run eslint
        working-directory: frontend
        run: npm run lint
